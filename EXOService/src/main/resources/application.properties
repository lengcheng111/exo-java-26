spring.application.name=EXOService
server.port=8085
spring.main.allow-bean-definition-overriding=true
# Mock API
mock-api.base-url=http://localhost:8080
mock-api.connect-timeout-ms=3000
mock-api.read-timeout-ms=5000
mock-api.write-timeout-ms=5000
mock-api.request-timeout-ms=10000
mock-api.retry.max-attempts=3
mock-api.retry.backoff-ms=500
# Kafka
spring.kafka.bootstrap-servers=localhost:9092
# Producer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=10
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
#spring.kafka.listener.ack-mode=record
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.exoservice.dto.UserMessage
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=*
kafka.consumer.retry.interval=2000
kafka.consumer.retry.attempts=3
# Consumer
kafka.consumer.group-id=folder-worker
kafka.consumer.concurrency=3
# Topic name
topic.user-check=folder-check-request
# Redis config
spring.data.redis.host=localhost
spring.data.redis.port=6379